# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

confirm_os_window_close 0

# 光标
cursor_shape block
# cursor_blink_interval 0.5
cursor none
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 0

# performance
repaint_delay 5
sync_to_monitor yes

scrollback_lines 10000
enable_audio_bell no

######### SYSTEM ############
# 窗口
hide_window_decorations        titlebar-only
background_opacity             0.85
background_blur                30
window_padding_width           4
remember_window_size           yes

# 标题栏
# tab_bar_edge                top
# tab_bar_style               powerline
# tab_powerline_style         slanted
# ###########################

######## KITTY #########
tab_bar_style               powerline
tab_powerline_style round

enabled_layouts Tall,Grid

inactive_text_alpha 0.9

allow_remote_control yes

# 让新 window/tab/os-window 继承当前 pane 的 cwd（zellij 风格）
# 依赖 shell_integration 注入 chpwd hook 发送 OSC 7
shell_integration enabled

active_border_color #FF8700

map f2 set_tab_title

# 继承 cwd 的新窗口/标签/OS 窗口
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+n     new_os_window_with_cwd

# Scrollback / 上一条命令输出 → nvim 编辑（依赖 shell_integration 的 OSC 133）
map f1           launch --type=overlay --stdin-source=@screen_scrollback nvim -c "set nomod nolist" -
map ctrl+shift+h launch --type=overlay --stdin-source=@last_cmd_output    nvim -c "set nomod nolist" -
map ctrl+shift+g show_last_command_output

# Hints kitten：Vimium 风格的屏幕元素跳跃
# map ctrl+shift+e   kitten hints --type=url
# map ctrl+shift+p>f kitten hints --type=path    --program=-
# map ctrl+shift+p>l kitten hints --type=line    --program=-
# map ctrl+shift+p>h kitten hints --type=hash    --program=-
# map ctrl+shift+p>n kitten hints --type=linenum

# 模拟 Delete 键（用于无 Del 键盘，如 zellij session-manager 删除 session）
map alt+backspace send_text all \x1b[3~

# 字体
font_size 14

clipboard_control write-clipboard write-primary read-clipboard read-primary
