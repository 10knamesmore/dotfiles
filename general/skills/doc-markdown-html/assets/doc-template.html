  <script type="module">
    const SHIKI_MODULE = 'https://esm.sh/shiki@3.0.0';
    const SHIKI_THEMES = { light: 'one-light', dark: 'tokyo-night' };
    const LANG_ALIAS = {
      ts: 'typescript',
      js: 'javascript',
      py: 'python',
      sh: 'bash',
      shell: 'bash',
      zsh: 'bash',
      yml: 'yaml',
      md: 'markdown',
      docker: 'dockerfile',
      txt: 'text',
    };

    let codeToHtmlPromise = null;

    function normalizeLang(lang) {
      const value = (lang || '').trim().toLowerCase();
      return LANG_ALIAS[value] || value || 'text';
    }

    function parseLineSpec(spec) {
      const lines = new Set();
      (spec || '').split(',').map((part) => part.trim()).filter(Boolean).forEach((part) => {
        const range = part.match(/^(\d+)-(\d+)$/);
        if (range) {
          const start = Number(range[1]);
          const end = Number(range[2]);
          for (let i = Math.min(start, end); i <= Math.max(start, end); i += 1) lines.add(i);
          return;
        }
        const single = Number(part);
        if (single > 0) lines.add(single);
      });
      return lines;
    }

    function getThemeName() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? SHIKI_THEMES.dark : SHIKI_THEMES.light;
    }

    function getItalicTokenColors(theme) {
      if (theme === SHIKI_THEMES.dark) {
        return new Set([
          '#51597d', // comments
          '#7a88cf', // doc comments / muted annotations
          '#9ece6a', // strings
          '#b4f9f8', // alt strings
          '#bb9af7', // keywords
          '#7aa2f7', // function names
          '#7dcfff', // import-like keywords in tokyo-night
          '#f7768e', // keyword-ish accents
          'rgb(81,89,125)',
          'rgb(122,136,207)',
          'rgb(122,162,247)',
          'rgb(158,206,106)',
          'rgb(180,249,248)',
          'rgb(187,154,247)',
          'rgb(125,207,255)',
          'rgb(247,118,142)',
        ]);
      }
      return new Set([
          '#6a737d', // comments
          '#032f62', // strings
          '#22863a', // strings / docs
          '#d73a49', // keywords
          '#6f42c1', // keywords / constants
          'rgb(106,115,125)',
          'rgb(3,47,98)',
          'rgb(34,134,58)',
          'rgb(215,58,73)',
          'rgb(111,66,193)',
      ]);
    }

    function normalizeColorValue(value) {
      return (value || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function applyVictorMonoItalic(shikiRoot, theme) {
      const italicColors = new Set(Array.from(getItalicTokenColors(theme)).map(normalizeColorValue));
      shikiRoot.querySelectorAll('span[style]').forEach((span) => {
        const color = normalizeColorValue(span.style.color || '');
        if (!color || !italicColors.has(color)) return;
        span.style.fontStyle = 'italic';
        span.style.fontFamily = '"Victor Mono", "JetBrains Mono", monospace';
        span.style.fontSynthesis = 'none';
      });
    }

    async function getCodeToHtml() {
      if (!codeToHtmlPromise) {
        codeToHtmlPromise = import(SHIKI_MODULE).then(({ codeToHtml }) => codeToHtml);
      }
      return codeToHtmlPromise;
    }

    function clearNativeSelectionForBlock(block) {
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection || !selection.rangeCount) return;
      const anchorNode = selection.anchorNode;
      const focusNode = selection.focusNode;
      const containsAnchor = anchorNode && block.contains(anchorNode);
      const containsFocus = focusNode && block.contains(focusNode);
      if (containsAnchor || containsFocus) {
        selection.removeAllRanges();
      }
    }

    function setNativeSelectionForLines(block, start, end) {
      const selection = window.getSelection ? window.getSelection() : null;
      if (!selection) return;

      const min = Math.min(start, end);
      const max = Math.max(start, end);
      const startContent = block.querySelector(`.code-line[data-line-number="${min}"] .line-content`);
      const endContent = block.querySelector(`.code-line[data-line-number="${max}"] .line-content`);
      if (!startContent || !endContent) return;

      const range = document.createRange();
      range.setStart(startContent, 0);
      range.setEnd(endContent, endContent.childNodes.length);
      selection.removeAllRanges();
      selection.addRange(range);

    function clearBlockSelection(block, options = {}) {
      const { clearNativeSelection = false } = options;
      block.querySelectorAll('.code-line.line-selected, .code-line.line-target').forEach((line) => {
        line.classList.remove('line-selected', 'line-target');
      });
      block.dataset.selectedStart = '';
      block.dataset.selectedEnd = '';
      if (clearNativeSelection) clearNativeSelectionForBlock(block);
    }

    function applyBlockSelection(block, start, end, options = {}) {
      const { syncNativeSelection = false } = options;
      const min = Math.min(start, end);
      const max = Math.max(start, end);
      clearBlockSelection(block, { clearNativeSelection: syncNativeSelection });
      block.querySelectorAll('.code-line').forEach((line) => {
        const lineNo = Number(line.dataset.lineNumber || '0');
        if (lineNo >= min && lineNo <= max) {
          line.classList.add('line-selected');
        }
      });
      block.dataset.selectedStart = String(min);
      block.dataset.selectedEnd = String(max);
      if (syncNativeSelection) setNativeSelectionForLines(block, min, max);
    }

    function getSelectedLineNumbers(block) {
      return Array.from(block.querySelectorAll('.code-line.line-selected')).map((line) => Number(line.dataset.lineNumber || '0')).filter(Boolean);
    }

    function updateCodeResetButton(block) {
      const btn = block.querySelector('.code-reset-btn');
      if (!btn) return;
      const original = block.getAttribute('data-original-code') || '';
      const current = block.getAttribute('data-current-code') || '';
      btn.disabled = original === current;
    }

    function decorateCodeBlock(block, renderedHtml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(renderedHtml, 'text/html');
      const shikiRoot = doc.querySelector('.shiki');
      const scroll = block.querySelector('.code-scroll');
      if (!shikiRoot || !scroll) throw new Error('No Shiki output');
      applyVictorMonoItalic(shikiRoot, getThemeName());

      const code = shikiRoot.querySelector('code');
      const lines = code ? Array.from(code.querySelectorAll('.line')) : [];
      const highlighted = parseLineSpec(block.dataset.highlightLines || '');

      if (code) {
        Array.from(code.childNodes).forEach((node) => {
          if (node.nodeType === Node.TEXT_NODE && !(node.textContent || '').trim()) {
            node.remove();
          }
        });
      }

      if (code && !lines.length) {
        const fallback = document.createElement('span');
        fallback.className = 'line';
        fallback.textContent = code.textContent || '';
        code.replaceChildren(fallback);
        lines.push(fallback);
      }

      lines.forEach((line, index) => {
        const lineNo = index + 1;
        line.classList.add('code-line');
        line.dataset.lineNumber = String(lineNo);

        const gutter = document.createElement('span');
        gutter.className = 'line-number';
        gutter.textContent = String(lineNo);

        const content = document.createElement('span');
        content.className = 'line-content';
        while (line.firstChild) content.appendChild(line.firstChild);

        line.replaceChildren(gutter, content);

        if (highlighted.has(lineNo)) line.classList.add('line-highlight');

      });

      scroll.replaceChildren(shikiRoot);
      block.classList.add('is-enhanced');
      block.classList.remove('is-render-failed');
      block.dataset.selectedStart = '';
      block.dataset.selectedEnd = '';
    }

    function syncLineTarget() {
      document.querySelectorAll('.content .code-line.line-target').forEach((line) => {
        line.classList.remove('line-target');
      });

      const match = location.hash.match(/^#(code-\d+)-L(\d+)$/);
      if (!match) return;

      const block = document.getElementById(match[1]);
      if (!block) return;

      const line = block.querySelector(`.code-line[data-line-number="${match[2]}"]`);
      if (!line) return;

      applyBlockSelection(block, Number(match[2]), Number(match[2]), { syncNativeSelection: false });
      line.classList.add('line-target', 'line-selected');
      line.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }

    function initCodeLineSelection() {
      if (window.__docCodeLineSelectionReady) return;
      window.__docCodeLineSelectionReady = true;

      let gesture = null;

      function findLineFromPoint(x, y, block) {
        const el = document.elementFromPoint(x, y);
        const line = el && el.closest ? el.closest('.code-line') : null;
        return line && block.contains(line) ? line : null;
      }

      function endGesture() {
        if (!gesture) return;
        document.documentElement.classList.remove('code-selecting-no-text');
        if (gesture.pointerId != null && gesture.captureEl && gesture.captureEl.releasePointerCapture) {
          try { gesture.captureEl.releasePointerCapture(gesture.pointerId); } catch (e) {}
        }
        gesture = null;
      }

      document.querySelectorAll('.content .code-block').forEach((block) => {
        block.addEventListener('pointerdown', (event) => {
          if (block.classList.contains('is-editing')) return;
          if (event.button !== 0) return;

          const content = event.target.closest && event.target.closest('.line-content');
          if (content && block.contains(content)) {
            clearBlockSelection(block, { clearNativeSelection: false });
            return;
          }

          const gutter = event.target.closest && event.target.closest('.line-number');
          if (!gutter || !block.contains(gutter)) return;

          const line = gutter.closest('.code-line');
          if (!line) return;

          const startLine = Number(line.dataset.lineNumber || '0');
          if (!startLine) return;

          gesture = {
            block,
            startLine,
            currentLine: startLine,
            pointerId: event.pointerId,
            startX: event.clientX,
            startY: event.clientY,
            moved: false,
            suppressTextSelection: true,
            captureEl: line,
          };

          event.preventDefault();
          document.documentElement.classList.add('code-selecting-no-text');
          if (line.setPointerCapture) {
            try { line.setPointerCapture(event.pointerId); } catch (e) {}
          }
        });

        block.addEventListener('pointermove', (event) => {
          if (!gesture || gesture.block !== block) return;
          const nextLineEl = findLineFromPoint(event.clientX, event.clientY, block);
          const dx = Math.abs(event.clientX - gesture.startX);
          const dy = Math.abs(event.clientY - gesture.startY);
          if (!gesture.moved && (dx > 4 || dy > 4)) {
            gesture.moved = true;
          }

          if (!nextLineEl) return;
          const nextLine = Number(nextLineEl.dataset.lineNumber || '0');
          if (!nextLine || nextLine === gesture.currentLine) return;
          gesture.currentLine = nextLine;
          gesture.moved = true;
          applyBlockSelection(block, gesture.startLine, gesture.currentLine, {
            syncNativeSelection: gesture.suppressTextSelection,
          });
        });

        block.addEventListener('pointerup', (event) => {
          if (!gesture || gesture.block !== block) return;

          const line = findLineFromPoint(event.clientX, event.clientY, block)
            || block.querySelector(`.code-line[data-line-number="${gesture.currentLine}"]`);
          const lineNo = line ? Number(line.dataset.lineNumber || '0') : gesture.currentLine;

          var shouldCopy = true;
          if (!gesture.moved) {
            const selected = getSelectedLineNumbers(block);
            if (selected.length === 1 && selected[0] === lineNo) {
              clearBlockSelection(block, { clearNativeSelection: true });
              shouldCopy = false;
            } else {
              applyBlockSelection(block, lineNo, lineNo, {
                syncNativeSelection: gesture.suppressTextSelection,
              });
            }
          } else {
            applyBlockSelection(block, gesture.startLine, lineNo, {
              syncNativeSelection: gesture.suppressTextSelection,
            });
          }

          if (shouldCopy && window.__docCopyText) {
            var selectedLines = Array.from(block.querySelectorAll('.code-line.line-selected .line-content'));
            var text = selectedLines.map(function (el) { return el.textContent || ''; }).join('\n');
            if (text) {
              var count = selectedLines.length;
              window.__docCopyText(text).then(function (ok) {
                if (ok && window.__docShowToast) window.__docShowToast('已复制 ' + count + ' 行');
              });
            }
          }

          endGesture();
        });

        block.addEventListener('pointercancel', endGesture);
      });

      document.addEventListener('pointerup', endGesture);
    }

    async function renderSingleCodeBlock(block, codeOverride) {
      let codeToHtml;
      try {
        codeToHtml = await getCodeToHtml();
      } catch (error) {
        block.classList.add('is-render-failed');
        return;
      }

      const pre = block.querySelector('pre');
      const code = typeof codeOverride === 'string'
        ? codeOverride
        : (block.dataset.currentCode || block.dataset.rawCode || (pre ? (pre.textContent || '').replace(/\n$/, '') : ''));
      const lang = normalizeLang(block.dataset.lang);
      if (!block.dataset.rawCode) block.dataset.rawCode = code;
      if (!block.dataset.originalCode) block.dataset.originalCode = block.dataset.rawCode;
      block.dataset.currentCode = code;

      try {
        const rendered = await codeToHtml(code, { lang, theme: getThemeName() });
        decorateCodeBlock(block, rendered);
        updateCodeResetButton(block);
      } catch (error) {
        block.classList.add('is-render-failed');
      }
    }

    async function renderCodeBlocks() {
      const blocks = Array.from(document.querySelectorAll('.content .code-block'));
      if (!blocks.length) return;
      for (const block of blocks) {
        if (!block.dataset.rawCode) {
          const pre = block.querySelector('pre');
          const initialCode = pre ? (pre.textContent || '').replace(/\n$/, '') : '';
          block.dataset.rawCode = initialCode;
        }
        if (!block.dataset.originalCode) block.dataset.originalCode = block.dataset.rawCode || '';
        if (!block.dataset.currentCode) block.dataset.currentCode = block.dataset.rawCode || '';

        if (block.classList.contains('is-editing')) {
          const textarea = block.querySelector('.code-editor-input');
          const current = textarea ? textarea.value : (block.dataset.currentCode || '');
          block.dataset.currentCode = current;
          if (window.__docUpdateEditPreview) await window.__docUpdateEditPreview(block, current);
          updateCodeResetButton(block);
        } else {
          await renderSingleCodeBlock(block, block.dataset.currentCode || '');
        }
      }

      syncLineTarget();
      initCodeLineSelection();
      if (window.__docBindCodeEditorButtons) window.__docBindCodeEditorButtons();
      if (window.__docRefreshSearchHighlights) window.__docRefreshSearchHighlights();
    }

    window.__docClearBlockSelection = clearBlockSelection;
    window.__docGetCodeToHtml = getCodeToHtml;
    window.__docNormalizeLang = normalizeLang;
    window.__docGetThemeName = getThemeName;
    window.__docApplyVictorMonoItalic = applyVictorMonoItalic;
    window.__docRenderSingleCodeBlock = renderSingleCodeBlock;

    let rerenderTimer = null;
    document.addEventListener('doc-theme-change', () => {
      window.clearTimeout(rerenderTimer);
      rerenderTimer = window.setTimeout(() => { renderCodeBlocks(); }, 60);
    });
    window.addEventListener('hashchange', syncLineTarget);
    document.addEventListener('DOMContentLoaded', () => { renderCodeBlocks(); });
  </script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const mermaidSources = new Map();

    function getMermaidTheme() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
    }

    async function renderMermaid() {
      mermaidSources.forEach((src, el) => {
        el.innerHTML = src;
        el.removeAttribute('data-processed');
      });
      mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
      await mermaid.run({ querySelector: '.mermaid' });
      bindMermaidZoom();
    }

    /* ── lightbox ── */
    const lightboxStateMap = new WeakMap();

    function openLightbox(sourceEl, content) {
      const overlay = document.createElement('div');
      overlay.className = 'doc-lightbox';
      const inner = document.createElement('div');
      inner.className = 'doc-lightbox-inner';
      inner.appendChild(content);
      overlay.appendChild(inner);

      const saved = lightboxStateMap.get(sourceEl);
      let scale = saved ? saved.scale : 1;
      let tx = saved ? saved.tx : 0;
      let ty = saved ? saved.ty : 0;

      function applyTransform() {
        inner.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        inner.style.transformOrigin = 'center center';
      }
      applyTransform();

      function computeInitialScale() {
        const rect = content.getBoundingClientRect();
        if (!rect.width || !rect.height) return 1;
        const targetW = window.innerWidth * 0.82;
        const targetH = window.innerHeight * 0.82;
        const fit = Math.min(targetW / rect.width, targetH / rect.height);
        return Math.min(Math.max(fit, 1), 4);
      }
      function fitInitial() {
        if (saved) return;
        scale = computeInitialScale();
        applyTransform();
      }
      if (!saved) {
        if (content.tagName === 'IMG' && !content.complete) {
          content.addEventListener('load', () => requestAnimationFrame(fitInitial), { once: true });
          requestAnimationFrame(fitInitial);
        } else {
          requestAnimationFrame(fitInitial);
        }
      }

      const close = () => {
        lightboxStateMap.set(sourceEl, { scale, tx, ty });
        overlay.remove();
      };
      let moved = false;
      overlay.addEventListener('mousedown', () => { moved = false; });
      overlay.addEventListener('mousemove', () => { moved = true; });
      overlay.addEventListener('click', () => { if (!moved) close(); });
      inner.addEventListener('click', e => e.stopPropagation());
      document.addEventListener('keydown', function onKey(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', onKey); }
      });

      overlay.addEventListener('wheel', e => {
        e.preventDefault();
        scale *= e.deltaY < 0 ? 1.1 : 1 / 1.1;
        scale = Math.min(Math.max(scale, 0.2), 10);
        applyTransform();
      }, { passive: false });

      let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;
      inner.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX; startY = e.clientY;
        startTx = tx; startTy = ty;
        inner.style.cursor = 'grabbing';
        e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!dragging) return;
        tx = startTx + e.clientX - startX;
        ty = startTy + e.clientY - startY;
        applyTransform();
      });
      window.addEventListener('mouseup', () => {
        dragging = false;
        inner.style.cursor = '';
      });

      document.body.appendChild(overlay);
    }

    function bindMermaidZoom() {
      document.querySelectorAll('.mermaid svg').forEach(svg => {
        svg.style.cursor = 'zoom-in';
        svg.onclick = () => openLightbox(svg, svg.cloneNode(true));
      });
    }

    function bindImageZoom() {
      document.querySelectorAll('.content img').forEach(img => {
        img.onclick = () => {
          const clone = img.cloneNode(true);
          clone.style.cursor = 'default';
          openLightbox(img, clone);
        };
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.mermaid').forEach(el => {
        mermaidSources.set(el, el.textContent.trim());
      });
      renderMermaid();
      bindImageZoom();
    });

    document.addEventListener('doc-theme-change', () => { renderMermaid(); });
  </script>
</body>
