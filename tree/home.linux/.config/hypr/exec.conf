###################
### 我的程序 ###
###################

# 请参考 https://wiki.hyprland.org/Configuring/Keywords/

#################
### 自动启动 ###
#################

# 自动启动必要的进程（如通知守护进程、状态栏等）
# 或者在启动时执行你喜欢的应用程序，如下所示：

# exec-once = $kitty
# exec-once = waybar 
exec-once = swaybg -i ~/Pictures/wallpapers/disco_elysium_wallpaper.png
exec-once = fcitx5 -d
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = quickshell
exec-once = $n/hypr/screen_effects.sh apply
# 键盘切换由 udev 规则处理，见 linux/udev/99-keyboard-inhibit.rules
exec-once = clash-verge
# exec-once = firefox
exec-once = google-chrome-stable
