# uosc 配置。未列项使用内置默认。
# 完整选项见 https://github.com/tomasklaen/uosc/blob/main/src/uosc.conf

# 顶栏:仅无边框时显示(我们 border=no,所以会出现,带标题与窗口控件)。
top_bar=no-border
top_bar_title=yes

# 时间轴外观。
timeline_style=line
timeline_size=40

# 进度条上叠加缓存进度(流媒体 / 网课在线播放有用)。
timeline_cache=yes

# 鼠标移到窗口边缘多近才唤出控件(像素)。
top_bar_persistency=paused
controls_persistency=paused

# autoload:这里保持关闭——续播交给 mpv.conf 的 autocreate-playlist=same(语义更全:
# 打开即整目录入 playlist)。开启 autocreate-playlist 后 uosc autoload 也不会触发。
autoload=no

# 删除文件是否进回收站(追剧删看过的集时有用)。
# 开启需依赖:macOS `brew install trash`,Linux `trash-cli`。默认关。
use_trash=no
