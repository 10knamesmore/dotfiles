# thumbfast 配置。uosc 原生对接,无需额外胶水。
# 完整选项见 https://github.com/po5/thumbfast/blob/master/thumbfast.conf

# 跨平台关键:socket / thumbnail 留空走自动(别硬编码路径)。
socket=
thumbnail=

# 缩略图生成上限(等比缩放)。提清晰度直接调大这两个,优于调 scale_factor。
max_height=300
max_width=300

# 对 HDR 源生成缩略图时 tone-map,auto = 沿用主播放配置,保证色彩一致。
tone_mapping=auto

# 网络 / 流媒体(YouTube、网课在线源)是否生成缩略图。想要在线缩略图改 yes。
network=no

# 缩略图子进程的硬解(独立于主播放)。Apple Silicon 可试 yes(videotoolbox)提速。
hwdec=no
