# ============================================================
# mpv.conf  ——  跨平台(macOS / Linux)通用配置
# 渲染核心:vo=gpu-next(libplacebo)。注释一律独立行
# (mpv.conf 行尾注释历史上会被当成值的一部分,别贪图省行)。
# ============================================================

# ---------- 视频输出与画质 ----------
# 0.41 默认且推荐的高质量 VO;显式固定(默认值文档声明 subject to change)。
vo=gpu-next

# 内置 profile。注意:0.41 里它只剩 scale=ewa_lanczossharp + scale-antiring=0.6
# + 两个 hdr-*;linear/sigmoid/correct-downscaling 现已默认开,无需再写。
profile=high-quality

# high-quality 自 0.38 起不再含 deband,必须自己开:压制色带,对压缩源/HDR 尤其明显。
deband=yes

# 4K→1080p 降采样更锐(默认 hermite 偏软)。
dscale=mitchell

# 抖动位深。默认 auto;macOS/Wayland 探测不到线缆位深,若确认是 10bit 面板可改成 10。
dither-depth=auto

# 硬解:auto-safe 跨平台自动选(macOS=videotoolbox,Linux=vaapi/nvdec);
# 配 gpu-next 用非 copy 硬解不损画质(chroma/缩放/deband 仍在 GPU 上由 mpv 做)。
hwdec=auto-safe

# ---------- 播放体验 ----------
# 播完最后一项暂停不退出(窗口留着)。
keep-open=yes

# 退出记忆进度(追剧/网课)。watch_later 默认落 XDG state 目录,不会写进受管仓库。
save-position-on-quit=yes

# 打开单文件时把同目录同类文件自动建成 playlist(0.39+ 原生,替代旧 autoload.lua)。
autocreate-playlist=same
directory-mode=lazy

# ---------- 字幕 ----------
# 模糊匹配外挂字幕(文件名不完全一致也加载)。
sub-auto=fuzzy
slang=zh,chi,zh-Hans,zh-Hant,en,eng
alang=zh,chi,jpn,ja,en,eng

# ---------- 截图 ----------
# 无损 png(默认是 jpg);文件名 = 源名-时间-序号,避免覆盖。
screenshot-format=png
screenshot-directory=~/Pictures
screenshot-template=%F-%P-%n

# ---------- OSC / OSD(为 uosc 让路) ----------
# 不需要写 osc=no:uosc 在 main.lua 启动时自己关掉内置 OSC。
# 关掉内置 osd-bar,反馈交给 uosc 的 flash-timeline/flash-volume/flash-speed。
osd-bar=no
# 无边框,uosc 自绘窗口控件与标题。
border=no

# ============================================================
# 平台条件 profile —— 用 mpv 原生 platform 属性自动套用(无需 include/软链分文件)。
# ============================================================

[macos]
profile-cond=platform=="darwin"
# macOS 上 gpu-next 经 macvk(MoltenVK→Metal,文档标 experimental),
# 不支持 target-colorspace-hint 式 HDR passthrough,HDR 由 libplacebo 内部 tone-map。
# 已知现象:mpv 在 macOS 不向系统发 EDR 元数据,HDR 可能偏暗(~60-70% 峰值白)。
# 若觉得暗,解开下一行并填显示器实际峰值 nits(如 M1 Pro 内置 XDR 持续约 1000):
#target-peak=1000

[linux]
profile-cond=platform=="linux"
# Wayland 下默认 target-colorspace-hint=auto 即真正 HDR passthrough,通常无需额外设置。

# ============================================================
# 插帧默认关。用 input.conf 的 I / Ctrl+I 运行时开关。
# 警告:display-resample 需恒定帧率 + 准确刷新率;ProMotion 120Hz / 多屏 / VRR 上
#       可能判断错乱;电影(24fps)很多人更偏好关闭(避免"肥皂剧"感)。故不设默认。
# ============================================================
