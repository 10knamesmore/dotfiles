# ============================================================
# input.conf  ——  Vim 风格键位 + uosc 绑定
# 反馈交给 uosc 的 flash-*(已配 mpv.conf osd-bar=no)。
# 说明:H/L/J/K 等大写键 = Shift+小写;多数大写键有 mpv 默认绑定,下面均显式覆盖。
# 行尾注释要求 # 前有空格(官方 input.conf 即如此)。
# ============================================================

# ---------- 跳转 seek(h/l 小步,H/L 大步) ----------
h no-osd seek -5 ; script-binding uosc/flash-timeline
l no-osd seek  5 ; script-binding uosc/flash-timeline
H no-osd seek -60 ; script-binding uosc/flash-timeline
L no-osd seek  60 ; script-binding uosc/flash-timeline
Shift+LEFT  no-osd seek -1 exact ; script-binding uosc/flash-timeline   # 精确逐秒
Shift+RIGHT no-osd seek  1 exact ; script-binding uosc/flash-timeline

# ---------- 音量(j/k) ----------
# 覆盖默认 j=cycle sub / J=cycle sub down;字幕轨切换改走 uosc 菜单(见 gs)。
j no-osd add volume -2 ; script-binding uosc/flash-volume
k no-osd add volume  2 ; script-binding uosc/flash-volume

# ---------- 速度(J/K 乘性;= 重置) ----------
J no-osd multiply speed 1/1.1 ; script-binding uosc/flash-speed
K no-osd multiply speed 1.1   ; script-binding uosc/flash-speed
= no-osd set speed 1.0 ; script-binding uosc/flash-speed

# ---------- 逐帧(0.41 frame-step 新签名;后退恒为精确 seek) ----------
. frame-step          # 前进一帧
, frame-back-step     # 后退一帧(= frame-step -1 seek)

# ---------- 播放控制 ----------
SPACE cycle pause
m cycle mute
f cycle fullscreen
q quit-watch-later    # 退出并存进度
Q quit                # 退出不存进度

# ---------- A-B 循环(默认在 l,已让位给 seek,改绑 r) ----------
r ab-loop             # 三态:设 A → 设 B → 清除

# ---------- 字幕微调(保留 mpv 默认语义) ----------
v cycle sub-visibility   # 显隐字幕(不受 j/k 改绑影响)
z add sub-delay -0.1     # 字幕提前
Z add sub-delay  0.1     # 字幕延后

# ---------- 截图 ----------
s screenshot              # 含字幕,原分辨率
S screenshot video        # 不含字幕
ctrl+s async screenshot   # 含 OSD,异步不阻塞

# ---------- 插帧开关(默认关;见 mpv.conf 警告) ----------
I set video-sync display-resample ; set interpolation yes ; show-text "插帧:开"
ctrl+i set video-sync audio ; set interpolation no ; show-text "插帧:关"

# ============================================================
# uosc 入口(uosc 所有命令默认未绑定,必须显式绑)
# ============================================================
Tab        script-binding uosc/toggle-ui
mbtn_right script-binding uosc/menu
ctrl+m     script-binding uosc/menu        # 键盘呼出主菜单
o          script-binding uosc/open-file
p          script-binding uosc/items       # 播放列表 / 目录浏览
c          script-binding uosc/chapters
g-s        script-binding uosc/subtitles   # 字幕轨(替代被 j 覆盖的 cycle sub)+ 在线下载
g-a        script-binding uosc/audio       # 音轨
g-v        script-binding uosc/video       # 视频轨
g-k        script-binding uosc/keybinds    # 浏览所有键位
g-S        script-binding uosc/stream-quality   # 在线源画质

# 菜单导航:uosc 菜单打开时由它接管 ↑/↓/Enter/Backspace/Esc,Ctrl+f 搜索。
# 全局 j/k 保持音量,不抢给菜单(故菜单内用方向键导航)。
