# 只写与默认值的差异（yazi 自动以默认值兜底，全量拷贝会随版本演进腐烂）。
# 对照基线：https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/yazi-default.toml
# "$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
linemode = "size_and_mtime"  # 自定义：大小 + 修改时间（init.lua 里定义）
mouse_events = []            # 全键盘流，禁用鼠标事件
title_format = "Yazi: {cwd}" # 终端标题随 cwd

[preview]
wrap = "yes" # 预览文本折行（默认截断）

# git.yazi 的状态拉取器（文件 + 目录两条规则；fetcher 异步跑，不卡列表渲染）
[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"

# opener 按表内键合并：只覆盖 play，edit/open/reveal/extract 继承默认
[opener]
play = [{ run = 'mpv --force-window %s', orphan = true, for = "unix" }]
