# 只写自定义键（prepend_keymap 优先于默认、其余全部继承默认——
# 全量 keymap = [...] 是整层替换，会丢失版本新增键，已退役）。
# 对照基线：https://github.com/sxyazi/yazi/blob/main/yazi-config/preset/keymap-default.toml
# 消歧语义（yazi-fm/src/router.rs）：按列表顺序取首键匹配的第一条，
# 多键序列 → 进等待菜单，单键 → 立即执行。prepend 在默认之前，故：
#   dd/yy 等序列遮蔽默认单键 d(remove)/y(yank)——按 d 只会等待，不会误删；
#   单键 t/o 立即执行，默认 tt/tr、o(open) 被遮蔽。
# "$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
prepend_keymap = [
	# 退出 / 标签（q 进等待：qq 退出、qt 关标签）
	{ on = ["q", "q"], run = "quit", desc = "Quit" },
	{ on = ["q", "t"], run = "close", desc = "Close tab (quit if last)" },
	{ on = "t", run = "tab_create --current", desc = "New tab (cwd)" },

	# 移动（覆盖默认 J/K = 预览窗 seek——光标五行跳更常用）
	{ on = "K", run = "arrow -5", desc = "Move cursor 5 up" },
	{ on = "J", run = "arrow 5", desc = "Move cursor 5 down" },

	# 进入：文件直接打开、目录下钻，一键两用
	{ on = "l", run = "plugin smart-enter", desc = "Enter dir / open file" },

	# vim 风格 复制/剪切/删除（序列键，遮蔽危险单键）
	{ on = ["y", "y"], run = "yank", desc = "Yank (copy)" },
	{ on = ["y", "d"], run = "copy dirname", desc = "Copy dirname" },
	{ on = ["y", "f"], run = "copy filename", desc = "Copy filename" },
	{ on = "Y", run = "copy path", desc = "Copy full path" },
	{ on = ["d", "d"], run = "yank --cut", desc = "Cut" },
	{ on = ["d", "D"], run = "remove", desc = "Trash" },
	{ on = ["d", "d", "d"], run = "remove --permanently", desc = "Delete permanently" },
	# 粘贴用默认单键 p / P（--force）

	# 新建 / 重命名（o 覆盖默认 open——打开走 l/<Enter>）
	{ on = "o", run = "create", desc = "Create file (dir ends with /)" },
	{ on = "I", run = "rename --cursor=start", desc = "Rename from start" },
	{ on = "A", run = "rename --cursor=end", desc = "Rename from end" },

	# 选择
	{ on = "<C-S-a>", run = "toggle_all", desc = "Toggle all" },

	# 书签跳转
	{ on = ["g", "p"], run = "cd ~/Documents", desc = "Go to Documents" },
	{ on = ["g", "e"], run = "cd ~/Desktop", desc = "Go to Desktop" },
]

[confirm]
prepend_keymap = [
	{ on = "q", run = "close", desc = "Cancel" },
]
