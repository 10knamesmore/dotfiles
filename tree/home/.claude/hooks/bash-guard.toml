# cc-hook bash-guard 规则表（PreToolUse/Bash）。
# 改这里即生效，无需重编译；引擎见 cli/crates/cc-hooks/。
#
# 语义：一条规则内给定的条件 AND；any/all 内层 OR；规则自上而下首条命中生效。
# 词形：`-x`（单杠+单字母）= 短旗标字母，可命中合写簇（-rf 含 r、f）；其余按字面词匹配。
# 决策：deny = 直接拦（reason 喂回模型让它改方案）；ask = 弹确认框给用户。

[[rules]]
name     = "rm-recursive-force"
cmd      = "rm"
all      = [["-r", "--recursive"], ["-f", "--force"]]
decision = "deny"
reason   = "守卫拦截：rm 递归+强制。改用更窄的具体路径并去掉 -f，或说明理由让用户手动执行。"

[[rules]]
name     = "git-push"
cmd      = "git"
subcmd   = "push"
decision = "ask"
reason   = "git 推送需要用户确认"

[[rules]]
name     = "git-reset-hard"
cmd      = "git"
subcmd   = "reset"
any      = ["--hard"]
decision = "ask"
reason   = "该操作会丢弃工作区改动，需要用户确认"

[[rules]]
name     = "git-clean-force"
cmd      = "git"
subcmd   = "clean"
all      = [["-f", "--force"]]
decision = "ask"
reason   = "该操作会丢弃工作区改动，需要用户确认"
