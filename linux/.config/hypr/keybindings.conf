
###################
### 键位绑定 ###
###################
$terminal = kitty
$fileManager = dolphin
# $menu = wofi --show drun
# $menu = fuzzel
$menu = hyprctl dispatch global quickshell:launcher

# 请参见 https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # 设置 "Windows" 键为主修改键

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, D, killactive,
bind = $mainMod, F, exec, $scripts_dir/hypr/toggle_fullscreen.sh
# bind = $mainMod SHIFT,F, fullscreen, 0
# bind = $mainMod, T, exec, killall -SIGUSR1 waybar
bind = $mainMod, T, exec, hyprctl dispatch global quickshell:toggleBar
bind = $mainMod, E, exec, $terminal launch_yazi.sh
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, S, layoutmsg, togglesplit
bind = $mainMod, P, exec, hyprshot -m region
bind = $mainMod SHIFT,P, exec, hyprshot -m window
bind = $mainMod SHIFT,T, exec, hyprctl dispatch global quickshell:settings
bind = $mainMod SHIFT,Q, exec, hyprlock

# 使用主 Mod 键 + 方向键切换焦点
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# 使用 Super + Shift + hjkl 移动窗口（按当前布局自动分流）
bind = $mainMod SHIFT, H, exec, $scripts_dir/hypr/layout_dispatch.sh shift h
bind = $mainMod SHIFT, J, exec, $scripts_dir/hypr/layout_dispatch.sh shift j
bind = $mainMod SHIFT, K, exec, $scripts_dir/hypr/layout_dispatch.sh shift k
bind = $mainMod SHIFT, L, exec, $scripts_dir/hypr/layout_dispatch.sh shift l

# 使用 Super + Control + hjkl 调整窗口尺寸（按当前布局自动分流）
binde = $mainMod CONTROL, H, exec, $scripts_dir/hypr/layout_dispatch.sh ctrl h
binde = $mainMod CONTROL, J, exec, $scripts_dir/hypr/layout_dispatch.sh ctrl j
binde = $mainMod CONTROL, K, exec, $scripts_dir/hypr/layout_dispatch.sh ctrl k
binde = $mainMod CONTROL, L, exec, $scripts_dir/hypr/layout_dispatch.sh ctrl l

# 使用主 Mod 键 + [0-9] 切换工作区
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# 将活动窗口移动到工作区，使用主 Mod 键 + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# 静默移动窗口到工作区（不跟随跳转）
bind = $mainMod CONTROL, 1, movetoworkspacesilent, 1
bind = $mainMod CONTROL, 2, movetoworkspacesilent, 2
bind = $mainMod CONTROL, 3, movetoworkspacesilent, 3
bind = $mainMod CONTROL, 4, movetoworkspacesilent, 4
bind = $mainMod CONTROL, 5, movetoworkspacesilent, 5
bind = $mainMod CONTROL, 6, movetoworkspacesilent, 6
bind = $mainMod CONTROL, 7, movetoworkspacesilent, 7
bind = $mainMod CONTROL, 8, movetoworkspacesilent, 8
bind = $mainMod CONTROL, 9, movetoworkspacesilent, 9
bind = $mainMod CONTROL, 0, movetoworkspacesilent, 10

# 特殊工作区 草稿版
bind = $mainMod, M, togglespecialworkspace, special
bind = $mainMod SHIFT,M, movetoworkspace, special

# 窗口分组（类似标签页）
bind = $mainMod, G, togglegroup
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# 快捷键速查
bind = $mainMod, slash, exec, hyprctl dispatch global quickshell:keybindings

# AI 助手
bind = $mainMod, A, exec, hyprctl dispatch global quickshell:ai

# 便签
bind = $mainMod, N, exec, hyprctl dispatch global quickshell:notes

# 系统日志
bind = $mainMod SHIFT, J, exec, hyprctl dispatch global quickshell:journal

# 窗口透明度 toggle
bind = $mainMod, O, exec, $scripts_dir/hypr/opacity_toggle.sh

# 专注模式
bind = $mainMod, Z, exec, $scripts_dir/hypr/focus_mode.sh

# Workspace save/restore
bind = $mainMod SHIFT, S, exec, $scripts_dir/hypr/workspace_save.sh
bind = $mainMod CONTROL SHIFT, S, exec, $scripts_dir/hypr/workspace_restore.sh

# 显示器模式切换
bind = $mainMod SHIFT, D, exec, echo -e "dual\nexternal\nlaptop" | fuzzel --dmenu --prompt "Monitor: " | xargs -I{} $scripts_dir/hypr/monitor_profile.sh {}

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ && hyprctl dispatch global quickshell:osdVolume
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && hyprctl dispatch global quickshell:osdVolume
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && hyprctl dispatch global quickshell:osdVolume
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+ && hyprctl dispatch global quickshell:osdBrightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%- && hyprctl dispatch global quickshell:osdBrightness

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
